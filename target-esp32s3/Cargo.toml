[package]
name = "target-esp32s3"
version = "0.1.0"
edition = "2021"

[dependencies]
shared = { path = "../shared" }
ed25519-dalek = { version = "2.1", default-features = false }
postcard = "1.0"

esp-backtrace = { version = "0.15.0", features = ["esp32s3", "panic-handler", "println"] }
esp-hal = { version = "1.1.1", features = ["esp32s3", "unstable"] }
smart-leds = "0.4.0"
esp-println = { version = "0.13.0", features = ["esp32s3", "log"] }
log = "0.4"
fugit = "0.4.0"
esp-hal-smartled2 = "0.28.2"
